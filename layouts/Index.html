{{ define "main" }}
  <div class="feed-wrapper" style="max-width:740px;margin:0 auto;padding:2rem;">
    <p class="feed-label">Recent Posts</p>
    {{ range .Paginator.Pages }}
      <div class="micro-card">
        <div class="post-date" aria-hidden="true">
          <span class="post-date-day">{{ .Date.Format "2" }}</span>
          <span class="post-date-month">{{ .Date.Format "Jan" }}</span>
        </div>
        <div>
          <div class="micro-body">
            {{ if .Title }}
              <div class="post-card-title">{{ .Title }}</div>
            {{ end }}
            {{ .Content }}
          </div>
          <p class="micro-footer">
            <a href="{{ .Permalink }}">
              <time datetime="{{ .Date.Format "2006-01-02" }}">
                {{ .Date.Format "Jan 2, 2006" }}
              </time>
            </a>
          </p>
        </div>
      </div>
    {{ else }}
      <p style="color: var(--color-text-muted); padding: 2rem 0;">No posts found.</p>
    {{ end }}
  </div>
{{ end }}
