<header class="site-header">

  <a href="{{ .Site.BaseURL }}" class="site-logo" aria-label="{{ .Site.Title }} home">
    Toby Geeks<span class="logo-accent"> Out!</span>
  </a>

  <!-- Hamburger toggle (mobile only — hidden via CSS on desktop) -->
  <button
    class="nav-toggle"
    aria-controls="site-nav"
    aria-expanded="false"
    aria-label="Toggle navigation"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="site-nav" aria-label="Primary navigation">
    <ul class="site-nav">

      <!-- Home is always first -->
      <li>
        <a href="{{ .Site.BaseURL }}"
          {{ if .IsHome }}class="active" aria-current="page"{{ end }}>
          Home
        </a>
      </li>

      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}"
          {{ if eq $.RelPermalink .URL }}class="active" aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}

    </ul>
  </nav>

</header>
